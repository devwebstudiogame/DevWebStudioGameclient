<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMENA — Menu Principal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<!-- Google Identity Services Library -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0E0F13;
    --surface: #1A1C23;
    --border: #2C2F3A;
    --text: #F2F1F6;
    --text-muted: #8B8D98;
    --accent: #FF3D6E;
    --accent-glow: rgba(255, 61, 110, 0.3);
    --success: #4ADE80;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .bg-pattern {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image: 
      radial-gradient(circle at 10% 10%, rgba(255, 61, 110, 0.1), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(124, 140, 255, 0.1), transparent 40%);
  }

  .container {
    text-align: center;
    width: 100%;
    max-width: 500px;
    padding: 60px 40px;
    background: rgba(26, 28, 35, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    color: var(--text);
    position: relative;
    display: inline-block;
  }

  .logo span {
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent-glow);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    margin-bottom: 40px;
  }

  /* Google Login Section */
  .auth-section {
    margin-bottom: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #google-login-btn {
    min-height: 40px;
  }

  .user-profile {
    display: none;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.05);
    padding: 8px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
  }

  .user-profile.show {
    display: flex;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--accent);
  }

  .user-name {
    font-size: 14px;
    font-weight: 600;
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 4px;
  }

  .menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .menu-item {
    text-decoration: none;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    padding: 20px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    width: 100%;
  }

  .menu-item:hover {
    border-color: var(--accent);
    transform: translateX(10px);
    background: rgba(255, 61, 110, 0.05);
  }

  .menu-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 4px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s ease;
  }

  .menu-item:hover::before {
    transform: scaleY(1);
  }

  .menu-item.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 10px 30px var(--accent-glow);
  }

  .menu-item.primary:hover {
    background: #ff527d;
    transform: scale(1.02);
  }

  .menu-item.primary::before { display: none; }

  .menu-item.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .menu-item.disabled:hover {
    transform: none;
    border-color: var(--border);
    background: var(--surface);
  }

  .menu-item .icon {
    font-size: 20px;
    opacity: 0.6;
  }

  .menu-item:hover .icon {
    opacity: 1;
    transform: translateX(5px);
    transition: all 0.2s ease;
  }

  .footer {
    margin-top: 60px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .save-info {
    margin-top: 30px;
    padding: 16px;
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 8px;
    font-size: 12px;
    color: var(--success);
    display: none;
  }

  .save-info.show {
    display: block;
  }

  .update-status {
    margin-top: 8px;
    font-size: 11px;
    color: #7c8cff;
  }

  .update-status.error {
    color: #f87171;
  }

  /* Loader for synchronization */
  .sync-loader {
    display: none;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
  }
  .sync-loader.active { display: block; }
</style>
</head>
<body>

  <div class="bg-pattern"></div>

  <div class="container">
    <div class="logo">LUMEN<span>A</span></div>
    <div class="subtitle">Direction de plateforme</div>

    <!-- Section Authentification Google -->
    <div class="auth-section">
      <div id="google-login-btn"></div>
      
      <div class="user-profile" id="user-profile">
        <img src="" alt="Avatar" class="user-avatar" id="user-avatar">
        <span class="user-name" id="user-name">Joueur</span>
        <button class="logout-btn" id="logout-btn">Déconnexion</button>
      </div>
      
      <div class="sync-loader" id="sync-loader">
        🔄 Synchronisation de la sauvegarde...
      </div>
    </div>

    <nav class="menu-list">
      <button class="menu-item primary" id="new-game-btn">
        Nouvelle Partie
        <span class="icon">▶</span>
      </button>
      
      <button class="menu-item" id="load-game-btn">
        Charger Partie
        <span class="icon">📂</span>
      </button>

      <button class="menu-item" id="quit-btn">
        Quitter
        <span class="icon">✕</span>
      </button>
    </nav>

    <div class="save-info" id="save-info">
      ✓ Une partie sauvegardée existe
    </div>

    <div class="footer">
      <span id="app-version">SYSTÈME LUMENA OS V.0.1</span> // Early Access 2026
      <div class="update-status" id="update-status" hidden></div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // Configuration Google (À remplacer par votre propre Client ID dans Google Cloud Console)
      const GOOGLE_CLIENT_ID = "730481651934-pid6rsfm64en1krqanvg48nuugmt8brt.apps.googleusercontent.com";

      const newGameBtn = document.getElementById('new-game-btn');
      const loadGameBtn = document.getElementById('load-game-btn');
      const quitBtn = document.getElementById('quit-btn');
      const saveInfo = document.getElementById('save-info');
      const googleLoginBtn = document.getElementById('google-login-btn');
      const userProfile = document.getElementById('user-profile');
      const userName = document.getElementById('user-name');
      const userAvatar = document.getElementById('user-avatar');
      const logoutBtn = document.getElementById('logout-btn');
      const syncLoader = document.getElementById('sync-loader');

      // --- Gestion de la Sauvegarde ---

      function hasSave() {
        return localStorage.getItem('lumena_save') !== null;
      }

      function deleteSave() {
        localStorage.removeItem('lumena_save');
      }

      // Simulation de récupération de sauvegarde depuis un serveur
      async function syncSaveFromServer(userEmail) {
        syncLoader.classList.add('active');
        
        // Simulation d'un délai réseau
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Note: Dans une application réelle, vous feriez un appel API ici
        // fetch('/api/get-save?email=' + userEmail)...
        
        const mockServerSave = { level: 5, score: 1250, timestamp: Date.now() };
        
        // Si aucune sauvegarde locale n'existe, on récupère celle du serveur
        if (!hasSave()) {
          localStorage.setItem('lumena_save', JSON.stringify(mockServerSave));
          console.log("Sauvegarde récupérée pour:", userEmail);
          updateUI();
        }
        
        syncLoader.classList.remove('active');
      }

      // --- Authentification Google ---

      function handleCredentialResponse(response) {
        // Décoder le JWT (ID Token) pour obtenir les infos utilisateur
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        
        // Mettre à jour l'interface
        userName.textContent = payload.name;
        userAvatar.src = payload.picture;
        
        googleLoginBtn.style.display = 'none';
        userProfile.classList.add('show');
        
        // Stocker l'état de connexion
        localStorage.setItem('lumena_user', JSON.stringify({
          name: payload.name,
          email: payload.email,
          picture: payload.picture
        }));

        // Lancer la synchronisation
        syncSaveFromServer(payload.email);
      }

      function initGoogleAuth() {
        if (typeof google === 'undefined') return;

        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleCredentialResponse
        });

        google.accounts.id.renderButton(
          googleLoginBtn,
          { theme: "outline", size: "large", text: "signin_with", shape: "pill" }
        );

        // Optionnel: One Tap prompt
        // google.accounts.id.prompt(); 
      }

      function logout() {
        localStorage.removeItem('lumena_user');
        googleLoginBtn.style.display = 'block';
        userProfile.classList.remove('show');
        location.reload(); // Recharger pour réinitialiser l'état
      }

      // --- Initialisation Générale ---

      function updateUI() {
        if (hasSave()) {
          saveInfo.classList.add('show');
          loadGameBtn.classList.remove('disabled');
        } else {
          saveInfo.classList.remove('show');
          loadGameBtn.classList.add('disabled');
        }
      }

      function init() {
        // Vérifier session existante
        const savedUser = localStorage.getItem('lumena_user');
        if (savedUser) {
          const user = JSON.parse(savedUser);
          userName.textContent = user.name;
          userAvatar.src = user.picture;
          googleLoginBtn.style.display = 'none';
          userProfile.classList.add('show');
        }

        updateUI();

        newGameBtn.addEventListener('click', () => {
          if (hasSave() && !confirm("Voulez-vous vraiment écraser votre sauvegarde actuelle ?")) return;
          deleteSave();
          window.location.href = 'lumena-final-v3.html';
        });

        loadGameBtn.addEventListener('click', () => {
          if (hasSave()) {
            window.location.href = 'lumena-final-v3.html';
          }
        });

        quitBtn.addEventListener('click', () => {
          if (window.lumenaDesktop?.isDesktop) {
            window.lumenaDesktop.quit();
          } else {
            window.close();
          }
        });

        logoutBtn.addEventListener('click', logout);

        setupDesktopFeatures();
        
        // Initialiser Google après un court délai pour s'assurer que le script est chargé
        setTimeout(initGoogleAuth, 1000);
      }

      async function setupDesktopFeatures() {
        const desktop = window.lumenaDesktop;
        if (!desktop?.isDesktop) return;

        const versionEl = document.getElementById('app-version');
        const updateEl = document.getElementById('update-status');

        try {
          const version = await desktop.getVersion();
          if (version) {
            versionEl.textContent = `SYSTÈME LUMENA OS V.${version}`;
          }
        } catch (_) {}

        desktop.onUpdateStatus((data) => {
          updateEl.hidden = false;
          updateEl.classList.remove('error');

          switch (data.status) {
            case 'checking':
              updateEl.textContent = 'Vérification des mises à jour...';
              break;
            case 'available':
              updateEl.textContent = `Mise à jour ${data.version} en cours de téléchargement...`;
              break;
            case 'downloaded':
              updateEl.textContent = `Mise à jour ${data.version} prête — redémarrage au prochain lancement`;
              break;
            case 'uptodate':
              updateEl.textContent = 'Jeu à jour';
              break;
            case 'error':
              updateEl.classList.add('error');
              updateEl.textContent = 'Impossible de vérifier les mises à jour';
              break;
            default:
              break;
          }
        });

        desktop.onUpdateProgress((data) => {
          updateEl.hidden = false;
          updateEl.textContent = `Téléchargement de la mise à jour... ${data.percent}%`;
        });
      }

      init();
    })();
  </script>

</body>
</html>
