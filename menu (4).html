<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMENA — Menu Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #0E0F13;
            --surface: #1A1C23;
            --border: #2C2F3A;
            --text: #F2F1F6;
            --text-muted: #8B8D98;
            --accent: #FF3D6E;
            --accent-glow: rgba(255, 61, 110, 0.3);
            --success: #4ADE80;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 61, 110, 0.1), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(124, 140, 255, 0.1), transparent 40%);
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: rgba(26, 28, 35, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 30px;
        }

        /* Formulaire */
        .auth-card {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        input {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-display);
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover { transform: translateY(-2px); background: #ff527d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toggle-auth {
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 10px;
        }

        /* Vues */
        #verify-view, #main-menu { display: none; }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 20px;
        }

        .menu-item {
            text-decoration: none;
            color: var(--text);
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 600;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.2s;
        }

        .menu-item:hover {
            border-color: var(--accent);
            transform: translateX(10px);
            background: rgba(255, 61, 110, 0.05);
        }

        .save-status {
            margin-top: 25px;
            font-size: 12px;
            color: var(--success);
            font-family: 'JetBrains Mono';
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono';
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- ÉCRAN CONNEXION / INSCRIPTION -->
    <div class="container" id="auth-view">
        <h1 class="logo">LUMEN<span>A</span></h1>
        <p class="subtitle">Accès au Système</p>

        <div class="auth-card">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button class="btn" id="auth-btn" onclick="handleAuth()">Se Connecter</button>
            <p class="toggle-auth" id="toggle-text" onclick="toggleAuthMode()">Créer un compte</p>
        </div>
    </div>

    <!-- ÉCRAN VÉRIFICATION -->
    <div class="container" id="verify-view">
        <h1 class="logo">CODE<span>A</span></h1>
        <p style="margin-bottom: 20px; color: var(--text-muted);">Un code a été envoyé à votre email.</p>
        <div class="auth-card">
            <input type="text" id="verify-code" placeholder="Code de vérification" maxlength="6">
            <button class="btn" onclick="confirmCode()">Valider le code</button>
            <p class="toggle-auth" onclick="location.reload()">Annuler</p>
        </div>
    </div>

    <!-- MENU PRINCIPAL -->
    <div class="container" id="main-menu">
        <h1 class="logo">LUMEN<span>A</span></h1>
        <p id="welcome-msg" style="font-size: 14px; margin-bottom: 20px; color: var(--accent);"></p>

        <div class="menu-list">
            <button class="menu-item" onclick="alert('Lancement du jeu...')">Nouvelle Partie <span>▶</span></button>
            <button class="menu-item" onclick="loadGame()">Charger Partie <span>📂</span></button>
            <button class="menu-item" onclick="logout()">Se Déconnecter <span>✕</span></button>
        </div>

        <div id="save-status" class="save-status"></div>
        
        <div class="footer">
            SYSTÈME LUMENA OS V.0.1 // SESSION SÉCURISÉE
        </div>
    </div>

    <script>
        // --- CONFIGURATION EMAILJS RÉELLE ---
        const EMAILJS_PUBLIC_KEY = "D7YNCSnm-vcNgh095";
        const EMAILJS_SERVICE_ID = "service_qie0pov";
        const EMAILJS_TEMPLATE_ID = "template_fzoa76l";

        emailjs.init(EMAILJS_PUBLIC_KEY);

        let isLoginMode = true;
        let generatedCode = null;
        let pendingUser = null;

        // --- GESTION DE LA SESSION (Déconnexion à la fermeture) ---
        window.onload = () => {
            const user = sessionStorage.getItem('loggedUser');
            if (user) {
                showMenu(JSON.parse(user));
            }
        };

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-btn').innerText = isLoginMode ? "Se Connecter" : "S'inscrire";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Créer un compte" : "Déjà un compte ? Se connecter";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("Champs requis.");

            if (isLoginMode) {
                // Vérification dans la base locale
                const users = JSON.parse(localStorage.getItem('lumena_users') || "[]");
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    sessionStorage.setItem('loggedUser', JSON.stringify(user));
                    showMenu(user);
                } else {
                    alert("Email ou mot de passe incorrect.");
                }
            } else {
                // Inscription : Envoi du code
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                pendingUser = { email, password };

                document.getElementById('auth-btn').disabled = true;
                document.getElementById('auth-btn').innerText = "Envoi du mail...";

                try {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                        to_email: email,
                        code: generatedCode
                    });
                    
                    document.getElementById('auth-view').style.display = 'none';
                    document.getElementById('verify-view').style.display = 'block';
                } catch (err) {
                    alert("Erreur d'envoi : " + JSON.stringify(err));
                    document.getElementById('auth-btn').disabled = false;
                    document.getElementById('auth-btn').innerText = "S'inscrire";
                }
            }
        }

        function confirmCode() {
            const inputCode = document.getElementById('verify-code').value;
            if (inputCode === generatedCode) {
                const users = JSON.parse(localStorage.getItem('lumena_users') || "[]");
                users.push(pendingUser);
                localStorage.setItem('lumena_users', JSON.stringify(users));

                sessionStorage.setItem('loggedUser', JSON.stringify(pendingUser));
                showMenu(pendingUser);
            } else {
                alert("Code incorrect.");
            }
        }

        function showMenu(user) {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('verify-view').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Connecté : " + user.email;
            checkSave(user.email);
        }

        function logout() {
            sessionStorage.removeItem('loggedUser');
            location.reload();
        }

        // --- GESTION DES SAUVEGARDES ---
        function checkSave(email) {
            const saves = JSON.parse(localStorage.getItem('lumena_saves') || "{}");
            const status = document.getElementById('save-status');
            if (saves[email]) {
                const date = new Date(saves[email].time).toLocaleString();
                status.innerText = "✓ DERNIÈRE SAUVEGARDE : " + date;
            } else {
                status.innerText = "AUCUNE SAUVEGARDE CLOUD";
            }
        }

        function loadGame() {
            const user = JSON.parse(sessionStorage.getItem('loggedUser'));
            const saves = JSON.parse(localStorage.getItem('lumena_saves') || "{}");
            if (saves[user.email]) {
                alert("Partie chargée !");
            } else {
                alert("Aucune donnée à charger.");
            }
        }
    </script>
</body>
</html>
