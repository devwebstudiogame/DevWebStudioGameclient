    // --- LOGIQUE JEU (Simplifiée pour l'exemple, gardez votre code original ici) ---
    let score = 0;

    function onGameOver(finalScore) {
        if (!currentUsername) return;
        
        // Sauvegarde record personnel sur Cloud
        let best = parseInt(localStorage.getItem("bestScore") || "0");
        if (finalScore > best) {
            localStorage.setItem("bestScore", finalScore);
            cloudSave("bestScore", finalScore);
        }

        // Ajout au classement mondial
        db.ref('leaderboard').push({
            username: currentUsername,
            score: finalScore,
            timestamp: Date.now()
        });
    }
