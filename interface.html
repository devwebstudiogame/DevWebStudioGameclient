<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Flappy Emoji - Jeu</title>
    <!-- SDK Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <!-- Votre canvas et UI de jeu... -->

    <script>
        const currentUsername = sessionStorage.getItem("currentUsername");
        
        // --- SAUVEGARDE DU SCORE (FIN DE PARTIE) ---
        function onGameOver(scoreValue) {
            if (!currentUsername) return;

            // 1. Sauvegarde locale (pour affichage immédiat)
            let bestScore = parseInt(localStorage.getItem("bestScore") || "0");
            if (scoreValue > bestScore) {
                localStorage.setItem("bestScore", scoreValue);
                // 2. Sauvegarde Cloud du record personnel
                cloudSave("bestScore", scoreValue);
            }

            // 3. Ajout au classement mondial (Top 10)
            // On n'ajoute que si c'est un score significatif ou on laisse le serveur trier
            db.ref('leaderboard').push({
                username: currentUsername,
                score: scoreValue,
                timestamp: Date.now()
            });
            
            console.log("Score synchronisé avec le Cloud !");
        }

        // ... Votre boucle de jeu Flappy Emoji ...
    </script>
</body>
</html>
