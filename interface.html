<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Emoji ✦ Saison 1</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #2c1a4d 0%, #0f0c29 100%);
      font-family: "Segoe UI Emoji", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
    }
    .game-layout {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 400px;
    }
    .leaderboard {
      position: absolute;
      right: calc(100% + 20px);
      top: 0;
      width: 260px;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 15px;
      padding: 15px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .leaderboard h2 {
      margin: 0 0 15px;
      font-size: 1.2em;
      text-align: center;
      color: #FFD700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .leaderboard table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .leaderboard th,
    .leaderboard td {
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      text-align: left;
    }
    .leaderboard th { color: rgba(255,255,255,0.6); font-weight: normal; font-size: 11px; text-transform: uppercase; }
    .leaderboard td:last-child { text-align: right; color: #FFD700; font-weight: bold; }
    
    .leaderboard-empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      padding: 20px 0;
      font-size: 13px;
    }
    canvas {
      background: #000;
      border: 3px solid rgba(255, 215, 0, 0.3);
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div class="game-layout">
    <aside class="leaderboard">
      <h2>🏆 Top 10</h2>
      <table>
        <thead>
          <tr>
            <th>Rang</th>
            <th>Pseudo</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
      <div id="leaderboard-empty" class="leaderboard-empty">Aucun score enregistré</div>
    </aside>
    <canvas id="game" width="400" height="600"></canvas>
  </div>

  <script>
    // Récupérer le pseudo depuis sessionStorage
    const currentUsername = sessionStorage.getItem("currentUsername") || "Joueur";
    
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const leaderboardBody = document.getElementById("leaderboard-body");
    const leaderboardEmpty = document.getElementById("leaderboard-empty");
    const leaderboardStorageKey = "topScores";

    // --- LOGIQUE CLASSEMENT ---
    function getLeaderboardScores() {
      return JSON.parse(localStorage.getItem(leaderboardStorageKey) || "[]");
    }

    function saveLeaderboardScores(scores) {
      localStorage.setItem(leaderboardStorageKey, JSON.stringify(scores));
    }

    function renderLeaderboard() {
      const topScores = getLeaderboardScores();
      leaderboardBody.innerHTML = "";
      if (topScores.length === 0) {
        leaderboardEmpty.style.display = "block";
        return;
      }
      leaderboardEmpty.style.display = "none";
      
      topScores.sort((a, b) => b.score - a.score).slice(0, 10).forEach((entry, index) => {
        const row = document.createElement("tr");
        if (entry.username === currentUsername) row.style.background = "rgba(255, 215, 0, 0.1)";
        row.innerHTML = `
          <td style="color:#FFD700; font-weight:bold;">#${index + 1}</td>
          <td style="max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${entry.username}</td>
          <td>${entry.score}</td>
        `;
        leaderboardBody.appendChild(row);
      });
    }

    function registerScore(scoreValue) {
      if (scoreValue <= 0) return;
      
      let cumulativeScore = parseInt(localStorage.getItem("cumulativeScore") || "0");
      cumulativeScore += Math.floor(scoreValue);
      localStorage.setItem("cumulativeScore", cumulativeScore);

      const scores = getLeaderboardScores();
      scores.push({ username: currentUsername, score: scoreValue });
      scores.sort((a, b) => b.score - a.score);
      saveLeaderboardScores(scores.slice(0, 20)); // Garder un peu plus pour le tri

      let bestScore = parseInt(localStorage.getItem("bestScore") || "0");
      if (scoreValue > bestScore) localStorage.setItem("bestScore", scoreValue);

      renderLeaderboard();
    }

    // --- LISTES DE SKINS (POUR LE RENDU) ---
    const emojiList = [
      { emoji: "😁", minScore: 0 }, { emoji: "😅", minScore: 50 }, { emoji: "🤣", minScore: 100 }, { emoji: "😂", minScore: 150 },
      { emoji: "🙂", minScore: 200 }, { emoji: "🙃", minScore: 250 }, { emoji: "🫠", minScore: 300 }, { emoji: "😉", minScore: 350 },
      { emoji: "🥰", minScore: 400 }, { emoji: "😍", minScore: 450 }, { emoji: "🤩", minScore: 500 }, { emoji: "😘", minScore: 550 },
      { emoji: "☺️", minScore: 600 }, { emoji: "🥲", minScore: 650 }, { emoji: "😛", minScore: 700 }, { emoji: "😜", minScore: 750 },
      { emoji: "🤗", minScore: 800 }, { emoji: "🤭", minScore: 850 }, { emoji: "🤫", minScore: 900 }, { emoji: "🤔", minScore: 950 },
      { emoji: "🫡", minScore: 1000 }, { emoji: "😒", minScore: 1050 }, { emoji: "🙄", minScore: 1100 }, { emoji: "🙂‍↔️", minScore: 1150 },
      { emoji: "🙂‍↕️", minScore: 1200 }, { emoji: "🥵", minScore: 1250 }, { emoji: "🤯", minScore: 1300 }, { emoji: "🥳", minScore: 1350 },
      { emoji: "😎", minScore: 1400 }, { emoji: "🤓", minScore: 1450 }, { emoji: "😮", minScore: 1500 }, { emoji: "🥺", minScore: 1550 },
      { emoji: "🥹", minScore: 1600 }, { emoji: "😥", minScore: 1650 }, { emoji: "😢", minScore: 1700 }, { emoji: "😭", minScore: 1750 },
      { emoji: "😱", minScore: 1800 }, { emoji: "😡", minScore: 1850 }, { emoji: "😠", minScore: 1900 }, { emoji: "💩", minScore: 1950 },
      { emoji: "👑", isShop: true, shopId: "emoji_0" }, { emoji: "💎", isShop: true, shopId: "emoji_1" }, { emoji: "🔥", isShop: true, shopId: "emoji_2" },
      { emoji: "⚡", isShop: true, shopId: "emoji_3" }, { emoji: "🌟", isShop: true, shopId: "emoji_4" }
    ];

    const pipeSkinList = [
      { name: "Classique", color: "#4CAF50", minScore: 0 }, { name: "Métal", color: "#607D8B", minScore: 50 },
      { name: "Or", color: "#FFD700", minScore: 100 }, { name: "Cristal", color: "#00BCD4", minScore: 150 },
      { name: "Lave", color: "#FF5722", minScore: 200 }, { name: "Arc-en-ciel", color: "linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3)", minScore: 250 },
      { name: "Cristal Prismatique", color: "linear-gradient(45deg, #ff0080, #00ff80, #8000ff, #ff8000)", isShop: true, shopId: "pipe_0" },
      { name: "Or Pur 24K", color: "linear-gradient(45deg, #FFD700, #FFA500, #FF8C00)", isShop: true, shopId: "pipe_1" },
      { name: "Diamant Noir", color: "linear-gradient(45deg, #000000, #1a1a1a, #333333)", isShop: true, shopId: "pipe_2" },
      { name: "Plasma Quantique", color: "linear-gradient(45deg, #00ffff, #ff00ff, #ffff00, #00ff00)", isShop: true, shopId: "pipe_3" },
      { name: "Matière Noire", color: "linear-gradient(45deg, #2c1810, #1a0e0a, #0d0603)", isShop: true, shopId: "pipe_4" },
      { name: "Énergie Cosmique", color: "linear-gradient(45deg, #ff6b6b, #4ec0ca, #45b7d1, #96ceb4)", isShop: true, shopId: "pipe_5" }
    ];

    const backgroundSkinList = [
      { name: "Ciel", colors: ["#4ec0ca", "#ffffff"], minScore: 0 }, { name: "Coucher", colors: ["#ff7b7b", "#ff9a56"], minScore: 50 },
      { name: "Nuit", colors: ["#2c3e50", "#1a252f"], minScore: 100 }, { name: "Aurore", colors: ["#667eea", "#764ba2"], minScore: 150 },
      { name: "Orage", colors: ["#434343", "#000000"], minScore: 200 }, { name: "Espace", colors: ["#0c0c0c", "#16213e"], minScore: 250 },
      { name: "Arc-en-ciel", colors: ["#ff0000", "#0000ff"], minScore: 300 },
      { name: "Nébuleuse d'Orion", colors: ["#0c0c0c", "#e94560"], isShop: true, shopId: "bg_0" },
      { name: "Trou Noir", colors: ["#000000", "#2d2d2d"], isShop: true, shopId: "bg_1" },
      { name: "Big Bang", colors: ["#ff0000", "#8000ff"], isShop: true, shopId: "bg_2" },
      { name: "Dimension Parallèle", colors: ["#667eea", "#4facfe"], isShop: true, shopId: "bg_3" },
      { name: "Univers Holographique", colors: ["#ff00ff", "#8000ff"], isShop: true, shopId: "bg_4" },
      { name: "Multivers Infini", colors: ["#ff6b6b", "#ff9ff3"], isShop: true, shopId: "bg_5" }
    ];

    const groundSkinList = [
      { name: "Herbe", color: "#8BC34A", minScore: 0 }, { name: "Sable", color: "#FFC107", minScore: 50 },
      { name: "Neige", color: "#E1F5FE", minScore: 100 }, { name: "Lave", color: "#FF5722", minScore: 150 },
      { name: "Glace", color: "#81D4FA", minScore: 200 }, { name: "Cristal", color: "#E1BEE7", minScore: 250 },
      { name: "Métal", color: "#607D8B", minScore: 300 },
      { name: "Or Pure", color: "linear-gradient(45deg, #FFD700, #FFA500)", isShop: true, shopId: "ground_0" },
      { name: "Diamant", color: "linear-gradient(45deg, #E1F5FE, #81D4FA)", isShop: true, shopId: "ground_1" },
      { name: "Néon", color: "linear-gradient(45deg, #00E676, #3F51B5)", isShop: true, shopId: "ground_2" },
      { name: "Plasma", color: "linear-gradient(45deg, #FF4081, #9C27B0)", isShop: true, shopId: "ground_3" },
      { name: "Cosmos", color: "linear-gradient(45deg, #1A1A2E, #0F3460)", isShop: true, shopId: "ground_4" },
      { name: "Holographique", color: "linear-gradient(45deg, #FF00FF, #FFFF00)", isShop: true, shopId: "ground_5" }
    ];

    // --- JEU ---
    let selectedEmoji = localStorage.getItem("selectedEmoji") || "😁";
    let selectedPipeSkin = parseInt(localStorage.getItem("selectedPipeSkin") || "0");
    let selectedBackgroundSkin = parseInt(localStorage.getItem("selectedBackgroundSkin") || "0");
    let selectedGroundSkin = parseInt(localStorage.getItem("selectedGroundSkin") || "0");

    let gameRunning = false;
    let score = 0;
    let gameOver = false;
    let frames = 0;
    const gravity = 0.25;
    const jump = 4.6;
    let bird = { x: 60, y: 150, size: 36, velocity: 0 };
    let pipes = [];

    function startGame() {
      gameRunning = true;
      score = 0;
      gameOver = false;
      frames = 0;
      bird.y = 150;
      bird.velocity = 0;
      pipes = [];
      draw();
    }

    function draw() {
      if (!gameRunning) return;
      
      // Fond
      const bg = backgroundSkinList[selectedBackgroundSkin];
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.colors.forEach((c, i) => grad.addColorStop(i/(bg.colors.length-1), c));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Bird
      bird.velocity += gravity;
      bird.y += bird.velocity;
      ctx.font = `${bird.size}px Arial`;
      ctx.fillText(selectedEmoji, bird.x, bird.y);

      // Pipes
      if (frames % 100 === 0) pipes.push({ x: canvas.width, top: Math.random()*200+50, gap: 120, passed: false });
      pipes.forEach((p, i) => {
        p.x -= 2.5;
        ctx.fillStyle = pipeSkinList[selectedPipeSkin].color.includes("gradient") ? "#FFD700" : pipeSkinList[selectedPipeSkin].color;
        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, p.top + p.gap, 50, canvas.height - (p.top + p.gap) - 40);
        
        if (!p.passed && p.x + 50 < bird.x) { p.passed = true; score++; }
        
        // Collision simple
        if (bird.x + 25 > p.x && bird.x + 5 < p.x + 50) {
          if (bird.y - 25 < p.top || bird.y > p.top + p.gap) gameOver = true;
        }
      });

      // Sol
      ctx.fillStyle = groundSkinList[selectedGroundSkin].color.includes("gradient") ? "#8BC34A" : groundSkinList[selectedGroundSkin].color;
      ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

      if (bird.y + 20 > canvas.height - 40 || bird.y < 0) gameOver = true;

      // Score
      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText(`Score: ${score}`, 10, 30);

      if (gameOver) {
        gameRunning = false;
        registerScore(score);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 110, 280);
        ctx.font = "20px Arial";
        ctx.fillText("Espace pour rejouer", 110, 320);
        ctx.fillText("🏠 Menu", canvas.width - 100, 30);
      } else {
        frames++;
        requestAnimationFrame(draw);
      }
    }

    document.onkeydown = (e) => { if (e.code === "Space") { if (!gameRunning) startGame(); else bird.velocity = -jump; } };
    canvas.onclick = (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (!gameRunning && x > canvas.width - 110 && y < 50) window.location.href = "menu.html";
    };

    renderLeaderboard();
    startGame();
  </script>
</body>
</html>
