<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Flappy Emoji ✦ Saison 1</title>
  <!-- SDK Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root { --primary: #FFD700; --bg: #0f0f2d; --card: #1e1e3f; }
    body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
    #usernameOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 25, 0.98); z-index: 2000; display: flex; justify-content: center; align-items: center; }
    .login-card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center; max-width: 400px; width: 90%; border: 1px solid #333; }
    .login-card h2 { color: var(--primary); margin-top: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
    .login-card p { color: #aaa; margin-bottom: 30px; line-height: 1.5; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; color: #888; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
    .login-card input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #0a0a1a; color: white; font-size: 18px; box-sizing: border-box; transition: border-color 0.3s; }
    .login-card input:focus { border-color: var(--primary); outline: none; }
    .login-card button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: transform 0.2s, filter 0.2s; }
    .login-card button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .login-card button:disabled { background: #555; cursor: not-allowed; }
    .security-note { margin-top: 25px; font-size: 12px; color: #666; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    /* Styles Menu existants simplifiés */
    #menu { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; }
    .header { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .main-btn { padding: 20px; border-radius: 15px; border: none; background: #2a2a5a; color: white; cursor: pointer; font-size: 18px; transition: background 0.3s; }
    .main-btn:hover { background: #3a3a7a; }
    .start-btn { grid-column: span 2; background: linear-gradient(45deg, #4CAF50, #45a049); font-weight: bold; }
    .leaderboard { margin-top: 30px; background: #0a0a1a; padding: 20px; border-radius: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th { color: #888; font-size: 12px; text-align: left; padding: 10px; }
    td { padding: 12px 10px; border-top: 1px solid #222; }
    .rank-col { color: var(--primary); font-weight: bold; width: 40px; }
    .score-col { text-align: right; font-family: monospace; }
  </style>
</head>
<body>

  <div id="usernameOverlay">
    <div class="login-card">
      <h2>✦ Saison 1 ✦</h2>
      <p>Connectez-vous pour synchroniser vos scores et vos skins sur tous vos écrans.</p>
      
      <div class="input-group">
        <label>Pseudo de Joueur</label>
        <input type="text" id="usernameInput" placeholder="Ex: FlappyMaster" maxlength="15">
      </div>
      
      <div class="input-group">
        <label>Code PIN (4 chiffres) 🔒</label>
        <input type="password" id="pinInput" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>

      <button id="saveUsernameBtn">SE CONNECTER / CRÉER</button>

      <div class="security-note">
        <span>🔒</span> Sauvegarde Cloud sécurisée via Google Firebase
      </div>
      <div style="font-size: 10px; color: #444; margin-top: 8px;">
        Votre PIN protège votre pseudo. Ne l'oubliez pas !
      </div>
    </div>
  </div>

  <div id="menu" style="display:none;">
    <div class="header">
      <h1>Flappy Emoji</h1>
      <p>Bienvenue, <span id="displayUsername" style="color:var(--primary); font-weight:bold;"></span> ! 🟢 En ligne</p>
    </div>

    <div class="btn-grid">
      <button class="main-btn start-btn" onclick="window.location.href='interface.html'">🚀 JOUER MAINTENANT</button>
      <button class="main-btn" onclick="window.location.href='passemoji.html'">🎯 PASS EMOJI</button>
      <button class="main-btn" onclick="window.location.href='boutique.html'">💰 BOUTIQUE</button>
    </div>

    <div class="leaderboard">
      <h3>🏆 TOP 10 MONDIAL</h3>
      <table>
        <thead>
          <tr><th>RANG</th><th>PSEUDO</th><th style="text-align:right;">SCORE</th></tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="3" style="text-align:center; color:#555;">Chargement du classement...</td></tr>
        </tbody>
      </table>
    </div>
    
    <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:#666; cursor:pointer; text-decoration:underline;">Se déconnecter</button>
  </div>

  <script>
    const usernameOverlay = document.getElementById("usernameOverlay");
    const usernameInput = document.getElementById("usernameInput");
    const pinInput = document.getElementById("pinInput");
    const saveUsernameBtn = document.getElementById("saveUsernameBtn");
    const menuDiv = document.getElementById("menu");
    const displayUsername = document.getElementById("displayUsername");

    window.onload = () => {
      const user = sessionStorage.getItem("currentUsername");
      const pin = sessionStorage.getItem("currentPin");
      if (user && pin) login(user, pin);
    };

    saveUsernameBtn.onclick = async () => {
      const user = usernameInput.value.trim();
      const pin = pinInput.value.trim();

      if (user.length < 2) return alert("Pseudo trop court !");
      if (pin.length !== 4 || isNaN(pin)) return alert("Le PIN doit faire 4 chiffres !");

      saveUsernameBtn.disabled = true;
      saveUsernameBtn.textContent = "Synchronisation...";

      try {
        const result = await syncUserData(user, pin);
        if (result.success) {
          sessionStorage.setItem("currentUsername", user);
          sessionStorage.setItem("currentPin", pin);
          login(user, pin);
        } else {
          alert("❌ Ce pseudo est déjà utilisé avec un autre code PIN.");
          saveUsernameBtn.disabled = false;
          saveUsernameBtn.textContent = "SE CONNECTER / CRÉER";
        }
      } catch (e) {
        console.error(e);
        alert("Erreur de connexion au serveur.");
        saveUsernameBtn.disabled = false;
      }
    };

    function login(user, pin) {
      usernameOverlay.style.display = "none";
      menuDiv.style.display = "block";
      displayUsername.textContent = user;
      updateLeaderboard();
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function updateLeaderboard() {
      const leaderboardBody = document.getElementById("leaderboardBody");
      db.ref('leaderboard').orderByChild('score').limitToLast(10).on('value', (snapshot) => {
        leaderboardBody.innerHTML = "";
        const scores = [];
        snapshot.forEach(child => { scores.push(child.val()); });
        scores.reverse();

        if (scores.length === 0) {
          leaderboardBody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Aucun score enregistré</td></tr>";
          return;
        }

        scores.forEach((entry, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `<td class="rank-col">#${index+1}</td><td>${entry.username}</td><td class="score-col">${entry.score}</td>`;
          if (entry.username === sessionStorage.getItem("currentUsername")) {
            row.style.background = "rgba(255, 215, 0, 0.1)";
            row.style.color = "#FFD700";
          }
          leaderboardBody.appendChild(row);
        });
      });
    }
  </script>
</body>
</html>
