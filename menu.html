  <style>
    body { margin: 0; background: skyblue; font-family: "Segoe UI Emoji", Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .game-layout { position: relative; display: flex; justify-content: center; align-items: flex-start; width: 400px; }
    .leaderboard { position: absolute; right: calc(100% + 20px); top: 0; width: 220px; background: rgba(0, 0, 0, 0.7); color: #fff; border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 10px; padding: 12px; box-sizing: border-box; }
    .leaderboard h2 { margin: 0 0 10px; font-size: 18px; text-align: center; }
    .leaderboard table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .leaderboard th, .leaderboard td { padding: 6px 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); text-align: left; }
    .leaderboard th:last-child, .leaderboard td:last-child { text-align: right; }
    .leaderboard tbody tr:last-child td { border-bottom: none; }
    .leaderboard-empty { text-align: center; color: rgba(255, 255, 255, 0.75); padding: 10px 0 4px; font-size: 13px; }
    canvas { background: linear-gradient(to bottom, #4ec0ca, #ffffff); border: 2px solid #000; border-radius: 10px; }
    
    /* Indicateur de synchronisation */
    .sync-status { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.5); }
  </style>

    // --- INTEGRATION FIREBASE ---
    function renderLeaderboard() {
      db.ref('leaderboard').orderByChild('score').limitToLast(10).on('value', (snap) => {
        leaderboardBody.innerHTML = "";
        const scores = [];
        snap.forEach(c => scores.push(c.val()));
        
        if (scores.length === 0) {
          leaderboardEmpty.style.display = "block";
          leaderboardEmpty.textContent = "Aucun score enregistré";
          return;
        }

        leaderboardEmpty.style.display = "none";
        scores.reverse().forEach((s, i) => {
          const row = document.createElement("tr");
          row.innerHTML = `<td>#${i+1}</td><td>${s.username}</td><td>${s.score}</td>`;
          leaderboardBody.appendChild(row);
        });
      });
    }

    function registerScore(scoreValue) {
      if (!Number.isFinite(scoreValue) || scoreValue < 0) return;

      // 1. Sauvegarde locale (cumulée)
      let cumulativeScore = parseInt(localStorage.getItem("cumulativeScore") || "0");
      cumulativeScore += Math.floor(scoreValue);
      localStorage.setItem("cumulativeScore", cumulativeScore);

      // 2. Sauvegarde Record Personnel (Cloud)
      let best = parseInt(localStorage.getItem("bestScore") || "0");
      if (scoreValue > best) {
        localStorage.setItem("bestScore", scoreValue);
        if (currentUsername) {
          cloudSave("bestScore", scoreValue);
        }
      }

      // 3. Envoi au Classement Mondial
      if (currentUsername) {
        db.ref('leaderboard').push({
          username: currentUsername,
          score: scoreValue,
          timestamp: Date.now()
        });
      }
    }
