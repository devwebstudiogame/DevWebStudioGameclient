<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pass Emoji – Saison 1 🎯</title>
  
  <!-- SDK Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    /* TOUS VOS STYLES ORIGINAUX ICI (Inter, Orbitron, etc.) */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
    :root { --bg: #0a0b14; --surface: #12141f; --card: #1a1d2e; --border: #252840; --gold: #f5c842; --gold2: #e8973a; --neon: #7b5fff; --locked-bg: #0f1018; --locked-fg: #3a3d55; --green: #22d47a; --red: #ff4d6d; --text: #e8eaf6; --muted: #6b6f99; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px 16px 40px; }
    
    /* Styles conservés... (Header, Timeline, Grid, Cards, etc.) */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 10px; font-size: .85em; font-weight: 600; text-decoration: none; margin-bottom: 28px; }
    .header { text-align: center; margin-bottom: 32px; }
    .season-badge { display: inline-block; background: linear-gradient(90deg, var(--gold), var(--gold2)); color: #0a0b14; font-family: 'Orbitron', sans-serif; font-size: .7em; font-weight: 900; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }
    .header h1 { font-family: 'Orbitron', sans-serif; font-size: 2.8em; background: linear-gradient(135deg, #fff 30%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .season-timeline { display: flex; align-items: center; justify-content: center; gap: 0; margin: 0 auto 40px; max-width: 720px; position: relative; }
    .timeline-line { position: absolute; top: 22px; left: 10%; right: 10%; height: 3px; background: var(--border); z-index: 0; }
    .timeline-progress { position: absolute; top: 22px; left: 10%; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold2)); z-index: 1; transition: width 1s ease; }
    .week-node { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2; cursor: pointer; }
    .node-dot { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; }
    .week-node.active .node-dot { border-color: var(--gold); background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #0a0b14; }
    .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
    .emoji-card { background: var(--card); border: 2px solid var(--border); border-radius: 18px; padding: 20px 12px 16px; text-align: center; position: relative; }
    .card-emoji { font-size: 3.2em; margin-bottom: 10px; }
    .card-unlocked { border-color: rgba(245,200,66,.35); }
    .card-locked { opacity: .6; filter: grayscale(1); }
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(.8); background: #1a1d2e; border: 2px solid var(--gold); border-radius: 24px; padding: 32px 40px; text-align: center; z-index: 9999; opacity: 0; transition: .4s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    
    /* Indicateur de sync */
    .sync-info { position: fixed; top: 10px; right: 10px; font-size: 10px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="sync-info">🟢 Cloud Sync Active</div>
  <a href="menu.html" class="back-btn">← Retour au Menu</a>

  <div class="header">
    <div class="season-badge">Saison 1</div>
    <h1>Pass Emoji</h1>
    <p>Débloquez des emojis exclusifs chaque semaine !</p>
  </div>

  <div class="season-timeline">
    <div class="timeline-line"></div>
    <div class="timeline-progress" id="timelineProgress"></div>
    <div class="week-node active" onclick="showWeek(0)"><div class="node-dot">1</div><div class="node-label">Semaine 1</div></div>
    <div class="week-node" onclick="showWeek(1)"><div class="node-dot">2</div><div class="node-label">Semaine 2</div></div>
    <div class="week-node" onclick="showWeek(2)"><div class="node-dot">3</div><div class="node-label">Semaine 3</div></div>
    <div class="week-node" onclick="showWeek(3)"><div class="node-dot">4</div><div class="node-label">Semaine 4</div></div>
  </div>

  <div id="passContent" class="emoji-grid">
    <!-- Contenu généré par JS -->
  </div>

  <div id="toast" class="toast">
    <div style="font-size: 4em;" id="toastEmoji">🐣</div>
    <h2 style="color: var(--gold); margin: 15px 0 5px;">NOUVEAU DÉBLOQUÉ !</h2>
    <p id="toastName">Emoji Spécial</p>
  </div>

  <script>
    const currentUsername = sessionStorage.getItem("currentUsername");
    let bestScore = parseInt(localStorage.getItem("bestScore") || "0");
    let seenUnlocks = JSON.parse(localStorage.getItem("seenUnlocks") || "[]");

    // --- INTEGRATION FIREBASE ---
    async function initSync() {
      if (currentUsername) {
        // Récupérer la progression depuis le Cloud
        db.ref('users/' + currentUsername).on('value', (snap) => {
          const data = snap.val();
          if (data) {
            if (data.bestScore > bestScore) {
              bestScore = data.bestScore;
              localStorage.setItem("bestScore", bestScore);
            }
            if (data.seenUnlocks) {
              seenUnlocks = data.seenUnlocks;
              localStorage.setItem("seenUnlocks", JSON.stringify(seenUnlocks));
            }
            renderPass();
          }
        });
      }
    }

    // --- VOTRE LOGIQUE DE PASS ORIGINALE ---
    const WEEKS = [
      {
        week: 1,
        date: "2026-06-27",
        emojis: [
          { tier: 1, emoji: "🐣", name: "Poussin", score: 10 },
          { tier: 2, emoji: "🐥", name: "Petit Oiseau", score: 50 },
          { tier: 3, emoji: "🦆", name: "Canard", score: 100 }
        ]
      },
      // ... Autres semaines ...
    ];

    function renderPass() {
      const content = document.getElementById("passContent");
      content.innerHTML = "";
      
      WEEKS[0].emojis.forEach(e => {
        const unlocked = bestScore >= e.score;
        const card = document.createElement("div");
        card.className = "emoji-card " + (unlocked ? "card-unlocked" : "card-locked");
        card.innerHTML = `
          <div class="card-emoji">${e.emoji}</div>
          <div class="card-name">${e.name}</div>
          <div class="card-score">${unlocked ? "✅ Débloqué" : e.score + " pts"}</div>
        `;
        
        // Si nouvellement débloqué, on enregistre et on affiche le toast
        const key = `w0_${e.emoji}`;
        if (unlocked && !seenUnlocks.includes(key)) {
          seenUnlocks.push(key);
          localStorage.setItem("seenUnlocks", JSON.stringify(seenUnlocks));
          if (currentUsername) cloudSave("seenUnlocks", seenUnlocks);
          showToast(e);
        }
        
        content.appendChild(card);
      });
    }

    function showToast(e) {
      document.getElementById("toastEmoji").textContent = e.emoji;
      document.getElementById("toastName").textContent = e.name;
      const t = document.getElementById("toast");
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    initSync();
    renderPass();
  </script>
</body>
</html>
